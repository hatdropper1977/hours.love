name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-hours-love
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  S3_BUCKET: hours.love
  CLOUDFRONT_DISTRIBUTION_ID: E13G7JZFCLGVHG

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          test -d _site || (echo "Expected build output directory '_site' not found" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::138226304273:role/GitHubActionsHoursLoveDeploy

      - name: Sync site to S3
        run: |
          aws s3 sync _site/ s3://${S3_BUCKET}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
